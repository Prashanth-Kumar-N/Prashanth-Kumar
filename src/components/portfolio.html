/* ─── NAVBAR ─────────────────────────────────────────────── */
function Navbar() {
  const [scrolled, setScrolled] = useState(false);
  const [menuOpen, setMenuOpen] = useState(false);
  const navLinks = [
    { label: "Home", href: "#hero" },
    { label: "About", href: "#about" },
    { label: "Experience", href: "#experience" },
    { label: "Skills", href: "#skills" },
    { label: "Contact", href: "#contact" },
  ];

  useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > 40);
    window.addEventListener("scroll", onScroll);
    return () => window.removeEventListener("scroll", onScroll);
  }, []);

  const handleNav = (e, href) => {
    e.preventDefault();
    setMenuOpen(false);
    document.querySelector(href)?.scrollIntoView({ behavior: "smooth" });
  };

  return (
    <nav style={{
      position: "fixed", top: 0, left: 0, right: 0, zIndex: 50,
      transition: "all 0.3s",
      background: scrolled ? "rgba(15,23,42,0.97)" : "transparent",
      backdropFilter: scrolled ? "blur(12px)" : "none",
      borderBottom: scrolled ? "1px solid rgba(34,211,238,0.1)" : "1px solid transparent",
    }}>
      <div style={{ maxWidth: 1152, margin: "0 auto", padding: "1rem 1.5rem", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <a href="#hero" onClick={e => handleNav(e, "#hero")} style={{ fontFamily: "JetBrains Mono, monospace", color: "#22d3ee", fontWeight: 700, fontSize: "1.1rem", letterSpacing: "0.2em", textDecoration: "none" }}>
          NPK<span style={{ color: "#64748b" }}>.</span>
        </a>

        {/* Desktop */}
        <ul style={{ display: "flex", gap: "2rem", listStyle: "none", padding: 0 }} className="hidden md:flex">
          {navLinks.map(link => (
            <li key={link.href}>
              <a href={link.href} onClick={e => handleNav(e, link.href)}
                style={{ color: "#94a3b8", fontSize: "0.8rem", letterSpacing: "0.12em", fontWeight: 500, textDecoration: "none", fontFamily: "JetBrains Mono, monospace", transition: "color 0.2s" }}
                onMouseEnter={e => e.target.style.color = "#22d3ee"}
                onMouseLeave={e => e.target.style.color = "#94a3b8"}
              >{link.label}</a>
            </li>
          ))}
        </ul>

        {/* Mobile toggle */}
        <button onClick={() => setMenuOpen(!menuOpen)}
          style={{ background: "none", border: "none", cursor: "pointer", display: "flex", flexDirection: "column", gap: 5, padding: 4 }}
          className="md:hidden">
          {[0,1,2].map(i => (
            <span key={i} style={{
              display: "block", width: 22, height: 2, background: "#94a3b8", borderRadius: 2,
              transition: "all 0.3s",
              transform: menuOpen ? (i===0?"rotate(45deg) translate(5px,5px)":i===2?"rotate(-45deg) translate(5px,-5px)":"scale(0)") : "none",
              opacity: menuOpen && i===1 ? 0 : 1,
            }} />
          ))}
        </button>
      </div>

      {/* Mobile menu */}
      {menuOpen && (
        <div style={{ background: "rgba(15,23,42,0.98)", borderTop: "1px solid rgba(34,211,238,0.1)", padding: "1rem 1.5rem 1.5rem" }}>
          {navLinks.map(link => (
            <a key={link.href} href={link.href} onClick={e => handleNav(e, link.href)}
              style={{ display: "block", color: "#94a3b8", padding: "0.5rem 0", fontSize: "0.85rem", letterSpacing: "0.1em", textDecoration: "none", fontFamily: "JetBrains Mono, monospace" }}

}
